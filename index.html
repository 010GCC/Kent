<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KENT // EXTERMINATOR</title>
<style>
  body {
    margin: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    touch-action: none;
  }

  #game-area {
    flex: 0 0 78dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f1a2a;
    overflow: hidden;
  }

  canvas {
    image-rendering: pixelated;
    background: #1a2a3a;
    width: auto;
    height: 100%;
    max-width: 100%;
    display: block;
  }

  #controls-area {
    flex: 0 0 22dvh;
    min-height: 135px;
    background: #0f0e14;
    border-top: 2px solid #2a2535;
    position: relative;
  }

  .touch-btn {
    position: absolute;
    background: rgba(80, 75, 95, 0.4);
    border: 4px solid rgba(190, 180, 210, 0.55);
    color: #e0d8f0;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    touch-action: none;
    user-select: none;
    transition: transform 0.05s ease;
  }

  .touch-btn:active {
    background: rgba(120, 110, 140, 0.6);
    transform: scale(0.94);
  }
</style>
</head>
<body>

<div id="game-area">
  <canvas id="game" width="720" height="1280"></canvas>
</div>

<div id="controls-area">
  <div id="btn-left"  class="touch-btn" style="left: 22px;  top: 12px;  width: 138px; height: 138px; font-size: 54px;">◀</div>
  <div id="btn-right" class="touch-btn" style="left: 172px; top: 12px;  width: 138px; height: 138px; font-size: 54px;">▶</div>
  <div id="btn-jump"  class="touch-btn" style="right: 22px;  top: 14px;  width: 128px; height: 128px; font-size: 34px; font-weight: 700;">A</div>
  <div id="btn-b"     class="touch-btn" style="right: 115px; top: 108px; width: 102px; height: 102px; font-size: 26px;">B</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha: false });

const WIDTH  = 180;
const HEIGHT = 320;
const SCALE  = 4;

// ── Physics constants ──────────────────────────────────────────
const GRAVITY       = 0.65;
const WALK_SPEED    = 2.7;
const JUMP_VY       = -11;
const JUMP_CUT      = 0.6;   // velocity multiplier on early release
const WALL_L        = 8;
const WALL_R        = WIDTH - 8;
const WALL_SLIDE_CAP = 1.5;  // max fall speed while sliding on wall
const WALL_KICK_X   = 3.8;   // horizontal impulse away from wall
const WALL_KICK_Y   = -9.5;  // vertical impulse from wall jump

// ── Seeded RNG ────────────────────────────────────────────────
function makeRng(seed) {
  let s = seed >>> 0;
  return () => {
    s ^= s << 13; s ^= s >> 17; s ^= s << 5;
    return (s >>> 0) / 4294967296;
  };
}
const rng = makeRng(0xBEEF42);

// ── Platform generation ───────────────────────────────────────
const GAP_NORM = 42;   // normal vertical gap
const GAP_WIDE = 65;   // wide gap — wall jump required or max held jump

// Starting platforms (world coords, y increases downward)
let platforms = [
  { x: 20,  y: 260, w: 140 },  // wide ground platform
  { x: 30,  y: 200, w: 60  },
  { x: 100, y: 150, w: 55  },
  { x: 25,  y: 105, w: 70  },
  { x: 95,  y: 60,  w: 50  },
  { x: 35,  y: 20,  w: 65  },
];
let platCount = platforms.length;
let topPlatY  = 20;  // world Y of highest generated platform

function genPlatform() {
  const isLeft    = platCount % 2 === 0;
  const wideChance = Math.min(0.35, Math.max(0, (platCount - 5) * 0.04));
  const isWide    = rng() < wideChance;
  const gap       = isWide ? GAP_WIDE : GAP_NORM;
  const y         = topPlatY - gap;
  const w         = 45 + Math.floor(rng() * 30);
  const x         = isLeft
    ? WALL_L + 4 + Math.floor(rng() * (WIDTH / 2 - w - WALL_L - 8))
    : WIDTH / 2 + 4 + Math.floor(rng() * (WIDTH / 2 - w - (WIDTH - WALL_R) - 4));
  platforms.push({ x, y, w });
  topPlatY = y;
  platCount++;
}

// Pre-generate enough to fill the screen + buffer above
for (let i = 0; i < 20; i++) genPlatform();

// ── Player ────────────────────────────────────────────────────
const player = {
  x: 84, y: 240,
  vx: 0, vy: 0,
  width: 12, height: 16,
  onGround: false,
  facing:   1,
  wallContact: 0,  // -1=left wall, 0=none, 1=right wall
  lastWall:    0,  // which wall was last jumped from (anti-cheese)
};

// ── Camera ────────────────────────────────────────────────────
let cameraY = 0;  // world Y mapped to top of screen

// ── Input ─────────────────────────────────────────────────────
const keys = {};
let touchLeft  = false;
let touchRight = false;
let touchJump  = false;

let jumpHeld            = false;
let jumpPressedThisFrame = false;
let keyJumpWasDown      = false;

window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

(function setupTouch() {
  const map = {
    'btn-left':  { on: () => { touchLeft  = true; },
                   off: () => { touchLeft  = false; } },
    'btn-right': { on: () => { touchRight = true; },
                   off: () => { touchRight = false; } },
    'btn-jump':  { on: () => { touchJump  = true;
                                if (!jumpHeld) { jumpPressedThisFrame = true; jumpHeld = true; } },
                   off: () => { touchJump  = false;
                                if (!keyJumpWasDown) jumpHeld = false; } },
    'btn-b':     { on: () => {}, off: () => {} },
  };
  for (const [id, h] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (!el) continue;
    el.addEventListener('touchstart',  e => { e.preventDefault(); h.on();  }, { passive: false });
    el.addEventListener('touchend',    e => { e.preventDefault(); h.off(); }, { passive: false });
    el.addEventListener('touchcancel', e => { e.preventDefault(); h.off(); }, { passive: false });
  }
})();

// ── Update ────────────────────────────────────────────────────
function update() {
  // Keyboard jump edge detection — mirrors the touch handler above
  const keyJumpDown = !!(keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']);
  if (keyJumpDown && !keyJumpWasDown) {
    if (!jumpHeld) { jumpPressedThisFrame = true; jumpHeld = true; }
  }
  if (!keyJumpDown && !touchJump) jumpHeld = false;
  keyJumpWasDown = keyJumpDown;

  // Horizontal movement
  const movL = !!(keys['ArrowLeft']  || keys['a'] || keys['A'] || touchLeft);
  const movR = !!(keys['ArrowRight'] || keys['d'] || keys['D'] || touchRight);
  const move = (movR ? 1 : 0) - (movL ? 1 : 0);
  if (move !== 0) {
    player.facing = move;
    player.vx = move * WALK_SPEED * (player.onGround ? 1 : 0.85);
  } else {
    player.vx *= 0.7;
  }

  // Jump / wall jump
  if (jumpPressedThisFrame) {
    jumpPressedThisFrame = false;
    if (player.onGround) {
      player.vy = JUMP_VY;
      player.onGround = false;
    } else if (player.wallContact !== 0 && player.wallContact !== player.lastWall) {
      player.vy  = WALL_KICK_Y;
      player.vx  = -player.wallContact * WALL_KICK_X;
      player.lastWall = player.wallContact;
    }
  }

  // Variable jump height: cut upward velocity on early release
  if (!jumpHeld && player.vy < 0) player.vy *= JUMP_CUT;

  // Gravity — wall slide caps fall speed
  if (player.wallContact !== 0 && player.vy > 0) {
    player.vy = Math.min(player.vy + GRAVITY, WALL_SLIDE_CAP);
  } else {
    player.vy += GRAVITY;
  }
  if (player.vy > 14) player.vy = 14;

  // Move
  player.x += player.vx;
  player.y += player.vy;

  // Wall clamp + contact (vy > 0 = falling, so contact only when moving into wall downward)
  player.wallContact = 0;
  if (player.x < WALL_L) {
    player.x = WALL_L;
    if (player.vy > 0) player.wallContact = -1;
  }
  if (player.x + player.width > WALL_R) {
    player.x = WALL_R - player.width;
    if (player.vy > 0) player.wallContact = 1;
  }

  // Platform collision — one-way top surface only
  player.onGround = false;
  const bottom = player.y + player.height;
  for (const p of platforms) {
    if (player.vy >= 0 &&
        player.x + player.width > p.x &&
        player.x < p.x + p.w &&
        bottom >= p.y &&
        bottom - player.vy <= p.y + 6) {
      player.y      = p.y - player.height;
      player.vy     = 0;
      player.onGround   = true;
      player.wallContact = 0;
      player.lastWall   = 0;
      break;
    }
  }

  // Hard floor below start (goo will replace this later)
  if (player.y + player.height > 278) {
    player.y     = 278 - player.height;
    player.vy    = 0;
    player.onGround = true;
    player.lastWall = 0;
  }

  // Camera: smooth follow, snap up fast, drift down slowly
  const targetCamY = player.y - HEIGHT * 0.55;
  if (targetCamY < cameraY) {
    cameraY = targetCamY;                      // snap up immediately
  } else {
    cameraY += (targetCamY - cameraY) * 0.08; // drift down slowly
  }

  // Generate platforms far enough above the camera
  while (topPlatY > cameraY - HEIGHT * 1.5) genPlatform();

  // Prune platforms well below camera to keep the list lean
  if (platforms.length > 100) {
    platforms = platforms.filter(p => p.y - cameraY < HEIGHT + 300);
  }
}

// ── Draw ──────────────────────────────────────────────────────
function draw() {
  ctx.save();
  ctx.scale(SCALE, SCALE);

  // Sky
  ctx.fillStyle = '#1a2a3a';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Pipe walls
  ctx.fillStyle = '#1a3020';
  ctx.fillRect(0,         0, WALL_L,        HEIGHT);
  ctx.fillRect(WALL_R,    0, WIDTH - WALL_R, HEIGHT);
  ctx.fillStyle = '#2a5030';
  ctx.fillRect(WALL_L - 2, 0, 2, HEIGHT);
  ctx.fillRect(WALL_R,     0, 2, HEIGHT);

  // Platforms
  for (const p of platforms) {
    const sy = Math.round(p.y - cameraY);
    if (sy < -8 || sy > HEIGHT + 8) continue;
    ctx.fillStyle = '#5a6a7a';
    ctx.fillRect(p.x, sy, p.w, 5);
    ctx.fillStyle = '#8aaabb';
    ctx.fillRect(p.x, sy, p.w, 2);
  }

  // Player
  const px = Math.round(player.x);
  const py = Math.round(player.y - cameraY);

  // Body
  ctx.fillStyle = '#d8742a';
  ctx.fillRect(px, py, player.width, player.height);
  // Hat
  ctx.fillStyle = '#3a5a8a';
  ctx.fillRect(px + 2, py - 4, 8, 5);
  // Eye
  ctx.fillStyle = '#fff';
  const eyeX = player.facing > 0 ? px + 8 : px + 2;
  ctx.fillRect(eyeX, py + 3, 2, 2);

  // Wall-slide highlight
  if (player.wallContact !== 0) {
    ctx.fillStyle = 'rgba(255,220,80,0.28)';
    ctx.fillRect(px, py, player.width, player.height);
  }

  ctx.restore();
}

// ── Loop ──────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
